; Avellaneda & Stoikov (2008) baseline: mid-price reference, inventory skew on.
; Все параметры цены -- в "центах" (uint64_t = price * 10000).

lob_path             = sample_data/lob_sample.csv
trades_path          = sample_data/trades_sample.csv
strategy             = as2008

initial_cash         = 1000000.0
max_events           = 0           ; 0 = весь файл
progress_interval    = 50000
print_progress       = true

; Исполнение.
transaction_cost_bps = 1.0
slippage_bps         = 0.0
queue_priority       = true

; Avellaneda-Stoikov.
gamma                = 0.1
k                    = 1.5
T_seconds            = 3600         ; ~час имитации
sigma_window         = 200
order_size           = 1
tick_size_cents      = 1
use_microprice       = false
enable_inventory_skew= true
max_inventory        = 25.0

; Куда пишем.
summary_csv          = reports/as2008_summary.csv
timeseries_csv       = reports/as2008_timeseries.csv
timeseries_step      = 200
