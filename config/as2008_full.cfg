; AS-2008, full dataset (HFT_PROJECT/MD/lob.csv + trades.csv).
; Параметр k будет переписан scripts/calibrate_lambda.py.

lob_path             = MD/lob.csv
trades_path          = MD/trades.csv
strategy             = as2008

initial_cash         = 1000000.0
max_events           = 0
progress_interval    = 100000
print_progress       = true

transaction_cost_bps = 1.0
slippage_bps         = 0.0
queue_priority       = true

gamma                = 0.05
k                    = 44.5934    ; updated by calibrate_lambda.py
T_seconds            = 86400        ; ~сутки
sigma_window         = 500
order_size           = 1000
tick_size_cents      = 1
use_microprice       = false
enable_inventory_skew= true
max_inventory        = 50000.0

summary_csv          = reports/as2008_full_summary.csv
timeseries_csv       = reports/as2008_full_timeseries.csv
timeseries_step      = 1000
