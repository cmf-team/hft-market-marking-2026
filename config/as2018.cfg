; Avellaneda-Stoikov с расширением 2018 (Stoikov "The Micro-Price"):
; reference price = microprice = (bid_px*ask_qty + ask_px*bid_qty) /
;                                (bid_qty + ask_qty).
; В остальном -- те же формулы AS-2008.

lob_path             = sample_data/lob_sample.csv
trades_path          = sample_data/trades_sample.csv
strategy             = as2018

initial_cash         = 1000000.0
max_events           = 0
progress_interval    = 50000
print_progress       = true

transaction_cost_bps = 1.0
slippage_bps         = 0.0
queue_priority       = true

gamma                = 0.1
k                    = 1.5
T_seconds            = 3600
sigma_window         = 200
order_size           = 1
tick_size_cents      = 1
use_microprice       = true
enable_inventory_skew= true
max_inventory        = 25.0

summary_csv          = reports/as2018_summary.csv
timeseries_csv       = reports/as2018_timeseries.csv
timeseries_step      = 200
