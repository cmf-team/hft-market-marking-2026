# Avellaneda-Stoikov strategy config

lob_file      = /project/data/lob.csv
trades_file   = /project/data/trades.csv
output_csv    = /project/data/results.csv
output_report = /project/data/report.txt

# risk aversion: higher -> wider spread, faster inventory mean-reversion
gamma = 0.1

# estimated mid-price volatility per tick
sigma = 0.001

# order arrival intensity: higher k -> tighter spread
k = 10000.0

# time horizon (normalized)
T = 1.0

# order size per quote
order_size = 100.0

# 1 = use microprice (Stoikov 2018), 0 = plain mid
use_microprice = 1
